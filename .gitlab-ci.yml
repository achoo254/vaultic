stages:
  - test
  - build
  - deploy

variables:
  CARGO_HOME: /cache/cargo
  REGISTRY: gitlabs.inet.vn:5050/dattqh/vaultic

# --- Rust ---

rust-test:
  stage: test
  image: rust:1.82-bookworm
  script:
    - cargo test --workspace
    - cargo clippy --all-targets -- -D warnings
    - cargo fmt --check
  cache:
    key: rust-deps
    paths:
      - target/

# --- Node.js ---

node-build:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile
  script:
    - pnpm build
    - pnpm lint
  cache:
    key: node-deps
    paths:
      - node_modules/
      - packages/*/node_modules/

# --- Docker ---

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  only:
    - tags
    - main
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -f docker/Dockerfile -t $REGISTRY:$CI_COMMIT_SHORT_SHA .
    - docker push $REGISTRY:$CI_COMMIT_SHORT_SHA
    - |
      if [ "$CI_COMMIT_TAG" ]; then
        docker tag $REGISTRY:$CI_COMMIT_SHORT_SHA $REGISTRY:$CI_COMMIT_TAG
        docker push $REGISTRY:$CI_COMMIT_TAG
      fi
