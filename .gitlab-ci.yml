stages:
  - test
  - build
  - deploy

variables:
  CARGO_HOME: /cache/cargo

# --- Rust ---

rust-test:
  stage: test
  image: rust:1.82-bookworm
  script:
    - cargo test --workspace
    - cargo clippy --all-targets -- -D warnings
    - cargo fmt --check
  cache:
    key: rust-deps
    paths:
      - target/

# --- Node.js ---

node-build:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile
  script:
    - pnpm build
    - pnpm lint
  cache:
    key: node-deps
    paths:
      - node_modules/
      - packages/*/node_modules/

# --- Extension Build ---

extension-build:
  stage: build
  image: node:22-alpine
  only:
    - main
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile
  script:
    - pnpm --filter @vaultic/extension build
    - cd packages/extension/.output/chrome-mv3 && zip -r ../../../../vaultic-extension.zip .
  artifacts:
    paths:
      - vaultic-extension.zip
    expire_in: 30 days
  cache:
    key: node-deps
    paths:
      - node_modules/
      - packages/*/node_modules/

# --- Deploy Staging ---

deploy-staging:
  stage: deploy
  image: alpine:3.20
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$DEPLOY_SSH_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      SSH_CMD="ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST"

      # Ensure deploy directory exists
      $SSH_CMD "mkdir -p $DEPLOY_PATH/extension"

      # Install Docker if not present
      $SSH_CMD "command -v docker || (dnf install -y dnf-plugins-core && dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo && dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin && systemctl enable --now docker)"

      # Setup deploy key for git access if not done
      $SSH_CMD "test -d $DEPLOY_PATH/.git || (cd $DEPLOY_PATH && git clone git@gitlabs.inet.vn:dattqh/vaultic.git .)"

      # Pull latest code
      $SSH_CMD "cd $DEPLOY_PATH && git fetch origin main && git reset --hard origin/main"

      # Write .env from CI variables
      $SSH_CMD "cat > $DEPLOY_PATH/.env << 'ENVEOF'
      POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      JWT_SECRET=$JWT_SECRET
      RUST_LOG=info
      VITE_API_URL=https://vaultic.inetdev.io.vn
      ENVEOF"

      # Build and deploy
      $SSH_CMD "cd $DEPLOY_PATH && docker compose -f docker/docker-compose.staging.yml up -d --build --remove-orphans"

      # Setup Nginx vhost if not present
      $SSH_CMD "test -f /etc/nginx/conf.d/vaultic.conf || (cp $DEPLOY_PATH/docker/nginx/vaultic.conf /etc/nginx/conf.d/vaultic.conf && nginx -t && systemctl reload nginx)"

    # Upload extension artifact
    - scp -P "$DEPLOY_PORT" vaultic-extension.zip "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/extension/vaultic-extension.zip"

    # Verify deployment
    - $SSH_CMD "curl -sf http://127.0.0.1:8080/health || echo 'WARNING: Health check failed'"
  environment:
    name: staging
    url: https://vaultic.inetdev.io.vn
  needs:
    - extension-build
