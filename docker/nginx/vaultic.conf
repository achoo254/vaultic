# Nginx vhost for Vaultic staging
# Cloudflare Flexible SSL — CF terminates HTTPS, we receive HTTP
# Copy to: /etc/nginx/conf.d/vaultic.conf

server {
    listen 80;
    server_name vaultic.inetdev.io.vn;

    # Only allow Cloudflare IPs (optional but recommended)
    # https://www.cloudflare.com/ips/

    # API reverse proxy
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Extension download
    location /download/ {
        alias /var/www/vaultic/extension/;
        autoindex off;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
