# Dev environment — reads from .env (local) or .env.staging
# Run: docker compose -f docker/docker-compose.yml up -d
# With staging env: docker compose -f docker/docker-compose.yml --env-file .env.staging up -d

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vaultic
      POSTGRES_USER: vaultic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultic"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://vaultic:${POSTGRES_PASSWORD:-dev}@postgres:5432/vaultic
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
